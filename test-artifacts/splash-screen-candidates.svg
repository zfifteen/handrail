<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <defs>
    <style>
      .page { fill: #050506; }
      .panel { fill: #111113; stroke: rgba(255,255,255,0.1); stroke-width: 1; }
      .screen { fill: #000; stroke: rgba(255,255,255,0.13); stroke-width: 1; }
      .label { fill: #fff; font: 700 25px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; }
      .caption { fill: rgba(255,255,255,0.58); font: 500 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif; }
      .micro { fill: rgba(255,255,255,0.42); font: 500 12px -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif; }
      .brand { fill: #fff; font: 760 32px -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; letter-spacing: 0; }
      .sub { fill: rgba(255,255,255,0.56); font: 600 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif; letter-spacing: 0; }
      .purple { stroke: #bf5af2; }
      .green { stroke: #30d158; }
      .blue { stroke: #0a84ff; }
      .orange { stroke: #ff9f0a; }
      .soft { stroke: rgba(255,255,255,0.26); }
      .thin { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .core { filter: url(#glow); }
      .grain { opacity: 0.12; }
      .spin { transform-box: fill-box; transform-origin: center; animation: spin 2s linear infinite; }
      .spinBack { transform-box: fill-box; transform-origin: center; animation: spinBack 2s linear infinite; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2s ease-in-out infinite; }
      .breathe { animation: breathe 2s ease-in-out infinite; }
      .draw { stroke-dasharray: 260; stroke-dashoffset: 260; animation: draw 2s ease-in-out infinite; }
      .rise { animation: rise 2s ease-in-out infinite; }
      .blink { animation: blink 2s steps(2, jump-none) infinite; }
      .handoff { animation: handoff 2s ease-in-out infinite; }
      .fadeIn { animation: fadeIn 2s ease-in-out infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spinBack { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(0.86); opacity: 0.52; }
        45% { transform: scale(1.08); opacity: 1; }
        70% { transform: scale(1); opacity: 0.84; }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.28; }
        45% { opacity: 0.92; }
        70% { opacity: 0.55; }
      }
      @keyframes draw {
        0% { stroke-dashoffset: 260; opacity: 0.2; }
        48% { stroke-dashoffset: 0; opacity: 1; }
        78% { stroke-dashoffset: -70; opacity: 0.8; }
        100% { stroke-dashoffset: -260; opacity: 0.24; }
      }
      @keyframes rise {
        0% { transform: translateY(34px); opacity: 0; }
        35%, 72% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-10px); opacity: 0; }
      }
      @keyframes blink {
        0%, 24% { opacity: 0; }
        25%, 64% { opacity: 1; }
        65%, 100% { opacity: 0.28; }
      }
      @keyframes handoff {
        0% { transform: translateX(-48px); opacity: 0; }
        24% { opacity: 1; }
        58% { transform: translateX(0); opacity: 1; }
        100% { transform: translateX(48px); opacity: 0; }
      }
      @keyframes fadeIn {
        0%, 18% { opacity: 0; transform: translateY(8px); }
        42%, 82% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0.35; transform: translateY(0); }
      }
    </style>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.72 0 0 0 0.2 0 0.2 0 0 0.7 0 0 0.8 0 0.95 0 0 0 0.7 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="0.6" fill="#fff"/>
      <circle cx="13" cy="9" r="0.5" fill="#fff"/>
      <circle cx="7" cy="15" r="0.4" fill="#fff"/>
    </pattern>
    <radialGradient id="phoneGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#7a35ff" stop-opacity="0.24"/>
      <stop offset="58%" stop-color="#141414" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="page" width="1500" height="1120"/>
  <rect class="grain" width="1500" height="1120" fill="url(#grain)"/>

  <text x="56" y="66" class="label">Handrail Launch Screen Candidates</text>
  <text x="56" y="96" class="caption">Codex-inspired geometry, native dark launch surface, each concept timed as a 2-second animated hold before handoff.</text>

  <g transform="translate(45,130)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">1. Faceted Knot</text>
    <text x="24" y="68" class="caption">A geometric core assembles, rotates, then fades into the app.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,134)" class="core">
        <circle class="thin purple breathe" r="62" stroke-width="1.2"/>
        <g class="spin">
          <path class="thin green" d="M-18,-46 L32,-33 L46,18 L8,49 L-40,28 L-48,-18 Z" stroke-width="8"/>
          <path class="thin purple" d="M-2,-48 L44,-4 L20,44 L-34,39 L-48,-8 Z" stroke-width="4"/>
        </g>
        <g class="spinBack" opacity="0.72">
          <path class="thin blue" d="M-42,10 L-10,-44 L45,-18 L36,36 L-18,48 Z" stroke-width="3"/>
        </g>
        <circle r="8" fill="#fff"/>
      </g>
      <text x="90" y="240" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="264" text-anchor="middle" class="sub fadeIn">Codex on your phone</text>
    </g>
  </g>

  <g transform="translate(530,130)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">2. Rail Pulse</text>
    <text x="24" y="68" class="caption">A straight handrail path fills once while Codex shards lock around it.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,132)">
        <line x1="0" y1="-78" x2="0" y2="78" class="thin soft" stroke-width="5"/>
        <line x1="0" y1="78" x2="0" y2="-78" class="thin purple draw" stroke-width="5"/>
        <g class="pulse core">
          <path d="M-46,-34 L-10,-58 L28,-42 L52,-8 L32,34 L-7,54 L-48,30 L-58,-8 Z" fill="none" stroke="#30d158" stroke-width="7" stroke-linejoin="round"/>
          <path d="M-32,0 L0,-28 L32,0 L0,28 Z" fill="none" stroke="#bf5af2" stroke-width="5" stroke-linejoin="round"/>
        </g>
        <circle cx="0" cy="-78" r="6" fill="#30d158"/>
        <circle cx="0" cy="0" r="7" fill="#bf5af2"/>
        <circle cx="0" cy="78" r="6" fill="#0a84ff"/>
      </g>
      <text x="90" y="246" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="269" text-anchor="middle" class="sub fadeIn">Starting session bridge</text>
    </g>
  </g>

  <g transform="translate(1015,130)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">3. Command Bloom</text>
    <text x="24" y="68" class="caption">Terminal prompt marks bloom into a Codex-like aperture.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,132)" class="core">
        <path class="thin green draw" d="M-62,-18 L-35,0 L-62,18" stroke-width="8"/>
        <path class="thin purple draw" d="M62,-18 L35,0 L62,18" stroke-width="8"/>
        <path class="thin blue draw" d="M-18,-62 L0,-35 L18,-62" stroke-width="8"/>
        <path class="thin orange draw" d="M-18,62 L0,35 L18,62" stroke-width="8"/>
        <circle class="thin soft spin" r="52" stroke-width="2" stroke-dasharray="12 14"/>
        <rect x="-20" y="-20" width="40" height="40" rx="8" fill="rgba(191,90,242,0.22)" stroke="#bf5af2"/>
        <rect x="-2" y="-10" width="4" height="20" rx="2" fill="#fff" class="blink"/>
      </g>
      <text x="90" y="246" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="269" text-anchor="middle" class="sub fadeIn">Ready for Codex</text>
    </g>
  </g>

  <g transform="translate(45,625)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">4. Prism Aperture</text>
    <text x="24" y="68" class="caption">Broken rings tighten into a stable center before the dashboard appears.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,132)">
        <g class="spin core">
          <path class="thin purple" d="M0,-68 A68,68 0 0 1 58,-35" stroke-width="7"/>
          <path class="thin green" d="M67,-4 A68,68 0 0 1 36,58" stroke-width="7"/>
          <path class="thin blue" d="M-8,67 A68,68 0 0 1 -58,34" stroke-width="7"/>
          <path class="thin orange" d="M-66,-9 A68,68 0 0 1 -28,-62" stroke-width="7"/>
        </g>
        <g class="spinBack" opacity="0.75">
          <path class="thin soft" d="M-44,-44 L44,44" stroke-width="3"/>
          <path class="thin soft" d="M44,-44 L-44,44" stroke-width="3"/>
        </g>
        <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="rgba(255,255,255,0.07)" stroke="#fff" stroke-opacity="0.46"/>
        <circle class="pulse" r="10" fill="#bf5af2"/>
      </g>
      <text x="90" y="246" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="269" text-anchor="middle" class="sub fadeIn">Opening control surface</text>
    </g>
  </g>

  <g transform="translate(530,625)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">5. Signal Handshake</text>
    <text x="24" y="68" class="caption">Mac and iPhone endpoints exchange one luminous Codex packet.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,132)">
        <rect x="-68" y="-22" width="42" height="30" rx="5" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="2"/>
        <line x1="-54" y1="11" x2="-40" y2="11" class="thin soft" stroke-width="2"/>
        <rect x="34" y="-30" width="28" height="56" rx="8" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="2"/>
        <circle cx="48" cy="17" r="2" fill="rgba(255,255,255,0.48)"/>
        <line x1="-24" y1="-6" x2="24" y2="-6" class="thin soft" stroke-width="3"/>
        <circle cx="0" cy="-6" r="12" fill="#bf5af2" class="handoff core"/>
        <g class="pulse" transform="translate(0,34)">
          <path class="thin green" d="M-24,-18 L8,-28 L31,-3 L17,24 L-15,28 L-32,4 Z" stroke-width="5"/>
          <path class="thin purple" d="M-4,-28 L29,-2 L4,28 L-29,4 Z" stroke-width="3"/>
        </g>
      </g>
      <text x="90" y="246" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="269" text-anchor="middle" class="sub fadeIn">Pairing live context</text>
    </g>
  </g>

  <g transform="translate(1015,625)">
    <rect class="panel" x="0" y="0" width="440" height="455" rx="8"/>
    <text x="24" y="42" class="label">6. Quiet Monogram</text>
    <text x="24" y="68" class="caption">A restrained H mark inherits Codex angular motion with less visual noise.</text>
    <g transform="translate(130,88)">
      <rect class="screen" x="0" y="0" width="180" height="330" rx="36"/>
      <rect x="8" y="8" width="164" height="314" rx="29" fill="url(#phoneGlow)"/>
      <rect x="64" y="15" width="52" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
      <g transform="translate(90,128)">
        <g class="core">
          <rect x="-38" y="-54" width="20" height="108" rx="8" fill="rgba(255,255,255,0.11)" stroke="#bf5af2"/>
          <rect x="18" y="-54" width="20" height="108" rx="8" fill="rgba(255,255,255,0.11)" stroke="#30d158"/>
          <rect x="-24" y="-10" width="48" height="20" rx="8" fill="rgba(191,90,242,0.45)"/>
          <g class="spin">
            <path class="thin purple" d="M-56,-42 L-18,-62 L24,-52 L56,-14" stroke-width="4"/>
            <path class="thin green" d="M56,42 L18,62 L-24,52 L-56,14" stroke-width="4"/>
          </g>
        </g>
        <circle class="thin soft breathe" r="70" stroke-width="1.4"/>
      </g>
      <text x="90" y="246" text-anchor="middle" class="brand fadeIn">Handrail</text>
      <text x="90" y="269" text-anchor="middle" class="sub fadeIn">Loading</text>
    </g>
  </g>
</svg>
